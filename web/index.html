<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>流量监控 - 实时图表</title>
  <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
    }

    /* ── 连接配置区 ── */
    .connect-card {
      background: white;
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .connect-card h2 {
      font-size: 18px;
      color: #333;
      margin-bottom: 16px;
    }

    .connect-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .connect-row label {
      font-size: 14px;
      color: #555;
      white-space: nowrap;
    }

    .connect-row input[type="text"] {
      flex: 1;
      min-width: 220px;
      padding: 9px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .connect-row input[type="text"]:focus {
      border-color: #667eea;
    }

    .connect-row select {
      padding: 9px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      background: white;
      min-width: 160px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .connect-row select:focus {
      border-color: #667eea;
    }

    .connect-row select:disabled {
      background: #f3f4f6;
      color: #9ca3af;
      cursor: not-allowed;
    }

    .btn-connect {
      padding: 9px 24px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-connect:hover {
      opacity: 0.9;
    }

    .btn-connect:active {
      transform: scale(0.97);
    }

    .btn-connect:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .connect-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #555;
    }

    .status-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #9ca3af;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .status-dot.connected {
      background: #10b981;
      animation: pulse 2s infinite;
    }

    .status-dot.error {
      background: #ef4444;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .connect-hint {
      margin-top: 10px;
      font-size: 12px;
      color: #9ca3af;
    }

    /* ── Header ── */
    .header {
      background: white;
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .header h1 {
      color: #333;
      font-size: 26px;
      margin-bottom: 10px;
    }

    .header-info {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      color: #666;
      font-size: 14px;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ns-badge {
      display: inline-block;
      background: linear-gradient(135deg, #667eea22, #764ba222);
      color: #5a4db0;
      border: 1px solid #a78bfa;
      border-radius: 20px;
      padding: 2px 12px;
      font-size: 13px;
      font-weight: 600;
    }

    .resolution-badge {
      display: inline-block;
      background: #f3f4f6;
      color: #6b7280;
      border-radius: 12px;
      padding: 1px 8px;
      font-size: 12px;
      margin-left: 6px;
    }

    /* ── 统计卡片 ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-5px);
    }

    .stat-label {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #333;
    }

    .stat-unit {
      font-size: 14px;
      color: #999;
      margin-left: 5px;
    }

    .stat-card.download .stat-value {
      color: #3b82f6;
    }

    .stat-card.upload .stat-value {
      color: #10b981;
    }

    .stat-card.total .stat-value {
      color: #f59e0b;
    }

    .stat-card.loss .stat-value {
      color: #ef4444;
    }

    /* ── 图表 ── */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .chart-card {
      background: white;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .chart-title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin-bottom: 20px;
    }

    .chart-container {
      position: relative;
      height: 350px;
    }

    /* ── 空态提示 ── */
    .empty-hint {
      text-align: center;
      padding: 60px 20px;
      color: #9ca3af;
      font-size: 15px;
    }

    .empty-hint .big-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    @media (max-width: 768px) {
      .charts-grid {
        grid-template-columns: 1fr;
      }

      .stat-value {
        font-size: 22px;
      }

      .connect-row {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- ── 连接配置 ── -->
    <div class="connect-card">
      <h2>⚙️ 连接配置</h2>
      <div class="connect-row">
        <label for="server-url">服务器地址</label>
        <input type="text" id="server-url" placeholder="http://192.168.1.1:8080" value="http://localhost:8080" />
        <label for="ns-select">命名空间</label>
        <select id="ns-select" disabled>
          <option value="">— 请先连接 —</option>
        </select>
        <label for="duration-select">时间范围</label>
        <select id="duration-select" disabled>
          <option value="5">5 分钟</option>
          <option value="10">10 分钟</option>
          <option value="15">15 分钟</option>
          <option value="30">30 分钟</option>
          <option value="60">1 小时</option>
          <option value="120">2 小时</option>
          <option value="180">3 小时</option>
          <option value="360">6 小时</option>
          <option value="720">12 小时</option>
          <option value="1440">1 天</option>
          <option value="10080">7 天</option>
          <option value="43200">30 天</option>
        </select>
        <button class="btn-connect" id="btn-connect">连接</button>
        <div class="connect-status">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">未连接</span>
        </div>
      </div>
      <div class="connect-hint" id="connect-hint">输入后端服务器地址，点击「连接」开始监控。时间范围越大，数据粒度越粗。</div>
    </div>

    <!-- ── 标题栏（连接后显示） ── -->
    <div class="header" id="main-header" style="display:none;">
      <h1>🌐 网络流量实时监控</h1>
      <div class="header-info">
        <div class="info-item">
          <strong>命名空间：</strong>
          <span class="ns-badge" id="current-ns-label">—</span>
        </div>
        <div class="info-item">
          <strong>时间范围：</strong>
          <span id="duration-label">5 分钟</span>
          <span class="resolution-badge" id="resolution-label">(1秒/点)</span>
        </div>
        <div class="info-item">
          <strong>时区：</strong>
          <span id="current-timezone">—</span>
        </div>
        <div class="info-item">
          <strong>最后更新：</strong>
          <span id="last-update">—</span>
        </div>
        <div class="info-item">
          <strong>数据点数：</strong>
          <span id="data-points">—</span>
        </div>
      </div>
    </div>

    <!-- ── 统计卡片 ── -->
    <div class="stats-grid" id="stats-section" style="display:none;">
      <div class="stat-card download">
        <div class="stat-label">📥 下载速度</div>
        <div class="stat-value" id="download-speed">0<span class="stat-unit">KB/s</span></div>
      </div>
      <div class="stat-card upload">
        <div class="stat-label">📤 上传速度</div>
        <div class="stat-value" id="upload-speed">0<span class="stat-unit">KB/s</span></div>
      </div>
      <div class="stat-card total">
        <div class="stat-label">📊 总速度</div>
        <div class="stat-value" id="total-speed">0<span class="stat-unit">KB/s</span></div>
      </div>
      <div class="stat-card loss">
        <div class="stat-label">⚠️ RX 丢包/秒</div>
        <div class="stat-value" id="rx-loss-per-sec">0<span class="stat-unit">包/秒</span></div>
      </div>
      <div class="stat-card loss">
        <div class="stat-label">⚠️ TX 丢包/秒</div>
        <div class="stat-value" id="tx-loss-per-sec">0<span class="stat-unit">包/秒</span></div>
      </div>
    </div>

    <!-- ── 网卡图表区 ── -->
    <div id="interface-charts" class="charts-grid"></div>

    <!-- ── 未连接时的空态 ── -->
    <div class="chart-card" id="empty-state">
      <div class="empty-hint">
        <div class="big-icon">📡</div>
        <div>请在上方输入服务器地址并点击「连接」以开始实时监控</div>
      </div>
    </div>

  </div>

  <script>
    'use strict';

    /* ═══════════════════════════════════════════
       状态
    ═══════════════════════════════════════════ */
    let baseUrl = '';
    let currentNs = '';
    let eventSource = null;
    let currentStreamToken = 0;
    const browserTimeZone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Asia/Shanghai';

    const interfaceCharts = {};   // name → ECharts instance
    const interfaceData = {};   // name → { labels, rx, tx }
    let historyData = [];
    // 当前选择的时间范围（分钟）
    let currentDuration = 5;
    // 当前数据分辨率
    let currentResolution = '1s';

    /* ═══════════════════════════════════════════
       DOM refs
    ═══════════════════════════════════════════ */
    const $serverUrl = document.getElementById('server-url');
    const $nsSelect = document.getElementById('ns-select');
    const $durationSelect = document.getElementById('duration-select');
    const $btnConnect = document.getElementById('btn-connect');
    const $statusDot = document.getElementById('status-dot');
    const $statusText = document.getElementById('status-text');
    const $durationLabel = document.getElementById('duration-label');
    const $resolutionLabel = document.getElementById('resolution-label');
    const $dataPoints = document.getElementById('data-points');
    const $connectHint = document.getElementById('connect-hint');
    const $mainHeader = document.getElementById('main-header');
    const $statsSection = document.getElementById('stats-section');
    const $emptyState = document.getElementById('empty-state');
    const $interfaceCharts = document.getElementById('interface-charts');

    /* ═══════════════════════════════════════════
       工具函数
    ═══════════════════════════════════════════ */
    function formatSpeed(bytesPerSec) {
      let value = bytesPerSec;
      let unit = 'B/s';
      if (value >= 1024 * 1024) {
        value = (value / (1024 * 1024)).toFixed(2);
        unit = 'MB/s';
      } else if (value >= 1024) {
        value = (value / 1024).toFixed(2);
        unit = 'KB/s';
      } else {
        value = value.toFixed(0);
      }
      return {value, unit};
    }

    function calcSpeed(curr, prev, intervalMs) {
      if (prev == null || intervalMs <= 0) return 0;
      return Math.max(0, ((curr - prev) / intervalMs) * 1000);
    }

    function calcLossRate(packets, errors, dropped, overruns, frameOrCarrier) {
      const total = packets + errors + dropped + overruns + frameOrCarrier;
      if (total === 0) return '0.00';
      return (((dropped + errors + overruns + frameOrCarrier) / total) * 100).toFixed(2);
    }

    function statHtml(formatted) {
      return `${formatted.value}<span class="stat-unit">${formatted.unit}</span>`;
    }

    // 格式化时间范围显示
    function formatDuration(minutes) {
      if (minutes < 60) return `${minutes} 分钟`;
      if (minutes < 120) return '1 小时';
      if (minutes < 180) return '2 小时';
      if (minutes < 360) return '3 小时';
      if (minutes < 720) return '6 小时';
      if (minutes < 1440) return '12 小时';
      if (minutes < 10080) return '1 天';
      if (minutes < 43200) return '7 天';
      return '30 天';
    }

    // 获取分辨率显示文本
    function getResolutionText(resolution) {
      switch (resolution) {
        case '1s': return '(1秒/点)';
        case '10s': return '(10秒/点)';
        case '1m': return '(1分钟/点)';
        case '1h': return '(1小时/点)';
        case '1d': return '(1天/点)';
        default: return `(${resolution}/点)`;
      }
    }

    /* ═══════════════════════════════════════════
       连接状态 UI
    ═══════════════════════════════════════════ */
    function setStatus(state, text) {
      $statusDot.className = 'status-dot' + (state === 'connected' ? ' connected' : state === 'error' ? ' error' : '');
      $statusText.textContent = text;
    }

    /* ═══════════════════════════════════════════
       主界面 显示 / 隐藏
    ═══════════════════════════════════════════ */
    function showDataUI() {
      $emptyState.style.display = 'none';
      $mainHeader.style.display = '';
      $statsSection.style.display = '';
    }

    function hideDataUI() {
      $emptyState.style.display = '';
      $mainHeader.style.display = 'none';
      $statsSection.style.display = 'none';
    }

    /* ═══════════════════════════════════════════
       图表 — 创建网卡折线图
    ═══════════════════════════════════════════ */
    function createInterfaceChart(name) {
      if (interfaceCharts[name]) return;

      const card = document.createElement('div');
      card.className = 'chart-card';
      card.id = `chart-card-${name}`;
      card.innerHTML = `
        <div class="chart-title">📊 ${name} 接口流量</div>
        <div class="chart-container" id="container-${name}"></div>
    `;
      $interfaceCharts.appendChild(card);

      const chart = echarts.init(document.getElementById(`container-${name}`));
      interfaceCharts[name] = chart;
      interfaceData[name] = {labels: [], rx: [], tx: [], rxDrop: [], txDrop: []};

      chart.setOption({
        tooltip: {trigger: 'axis'},
        legend: {data: ['下载', '上传', 'RX丢包', 'TX丢包'], top: 0},
        grid: {left: '3%', right: '4%', bottom: '3%', containLabel: true},
        xAxis: {
          type: 'category',
          boundaryGap: false,
          data: [],
          // 3小时约10800个点，每600个点(10分钟)显示一个标签
          axisLabel: {interval: 599, rotate: 0}
        },
        yAxis: [
          {
            type: 'value',
            name: '速度',
            position: 'left',
            axisLabel: {formatter: (v) => v + ' KB/s'}
          },
          {
            type: 'value',
            name: '丢包',
            position: 'right',
            axisLabel: {formatter: (v) => v + ' 包/s'}
          }
        ],
        series: [
          {
            name: '下载', type: 'line', smooth: true, data: [],
            yAxisIndex: 0,
            sampling: 'lttb',
            large: true,
            largeThreshold: 1000,
            itemStyle: {color: '#3b82f6'},
            areaStyle: {
              color: {
                type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
                colorStops: [
                  {offset: 0, color: 'rgba(59,130,246,0.3)'},
                  {offset: 1, color: 'rgba(59,130,246,0.05)'}
                ]
              }
            }
          },
          {
            name: '上传', type: 'line', smooth: true, data: [],
            yAxisIndex: 0,
            sampling: 'lttb',
            large: true,
            largeThreshold: 1000,
            itemStyle: {color: '#10b981'},
            areaStyle: {
              color: {
                type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
                colorStops: [
                  {offset: 0, color: 'rgba(16,185,129,0.3)'},
                  {offset: 1, color: 'rgba(16,185,129,0.05)'}
                ]
              }
            }
          },
          {
            name: 'RX丢包', type: 'line', smooth: true, data: [],
            yAxisIndex: 1,
            sampling: 'lttb',
            large: true,
            largeThreshold: 1000,
            itemStyle: {color: '#ef4444'},
            lineStyle: {type: 'dashed'}
          },
          {
            name: 'TX丢包', type: 'line', smooth: true, data: [],
            yAxisIndex: 1,
            sampling: 'lttb',
            large: true,
            largeThreshold: 1000,
            itemStyle: {color: '#f97316'},
            lineStyle: {type: 'dashed'}
          }
        ]
      });
    }

    /* ═══════════════════════════════════════════
       清空所有图表 & 数据
    ═══════════════════════════════════════════ */
    function clearCharts() {
      // 销毁旧网卡图表并清空容器
      Object.keys(interfaceCharts).forEach(name => {
        interfaceCharts[name].dispose();
        delete interfaceCharts[name];
        delete interfaceData[name];
      });
      $interfaceCharts.innerHTML = '';

      // 重置历史
      historyData = [];

      // 重置统计卡片
      document.getElementById('download-speed').innerHTML = statHtml({value: '0', unit: 'KB/s'});
      document.getElementById('upload-speed').innerHTML = statHtml({value: '0', unit: 'KB/s'});
      document.getElementById('total-speed').innerHTML = statHtml({value: '0', unit: 'KB/s'});
      document.getElementById('rx-loss-per-sec').innerHTML = '0<span class="stat-unit">包/秒</span>';
      document.getElementById('tx-loss-per-sec').innerHTML = '0<span class="stat-unit">包/秒</span>';
      document.getElementById('last-update').textContent = '—';
      document.getElementById('data-points').textContent = '—';
    }

    /* ═══════════════════════════════════════════
       数据处理
    ═══════════════════════════════════════════ */
    function processHistoryData(incoming, isAggregated) {
      historyData = incoming;
      currentResolution = incoming.length > 0 && incoming[0].resolution ? incoming[0].resolution : '1s';

      // 更新分辨率显示
      $resolutionLabel.textContent = getResolutionText(currentResolution);

      // 重建每个接口的时间序列
      Object.keys(interfaceData).forEach(k => {
        interfaceData[k] = {labels: [], rx: [], tx: [], rxDrop: [], txDrop: []};
      });

      let totalRxSpeed = 0;
      let totalTxSpeed = 0;

      // 判断是否为聚合数据
      if (isAggregated || (historyData.length > 0 && historyData[0].rx_speed_avg !== undefined)) {
        // 聚合数据处理
        historyData.forEach((data, index) => {
          const isLast = index === historyData.length - 1;
          const time = new Date(data.timestamp_ms).toLocaleString('zh-CN', {
            timeZone: browserTimeZone,
            hour12: false
          });

          // 聚合数据直接包含平均速度
          const rxSpeed = data.rx_speed_avg || 0;
          const txSpeed = data.tx_speed_avg || 0;

          // 使用默认接口名 'total'
          if (!interfaceData['total']) {
            createInterfaceChart('total');
          }
          interfaceData['total'].labels.push(time);
          interfaceData['total'].rx.push((rxSpeed / 1024).toFixed(2));
          interfaceData['total'].tx.push((txSpeed / 1024).toFixed(2));

          if (isLast) {
            totalRxSpeed = rxSpeed;
            totalTxSpeed = txSpeed;
          }

        });
      } else {
        // 原始数据处理
        historyData.forEach((data, index) => {
          const isLast = index === historyData.length - 1;
          const time = new Date(data.timestamp_ms).toLocaleString('zh-CN', {
            timeZone: browserTimeZone,
            hour12: false
          });

          (data.interfaces || []).forEach(iface => {
            const name = iface.name;
            createInterfaceChart(name);

            // 直接使用服务端计算的速度
            const rxSpeed = iface.rx_speed || 0;
            const txSpeed = iface.tx_speed || 0;

            interfaceData[name].labels.push(time);
            interfaceData[name].rx.push((rxSpeed / 1024).toFixed(2));
            interfaceData[name].tx.push((txSpeed / 1024).toFixed(2));
            interfaceData[name].rxDrop.push(iface.rx_dropped_speed || 0);
            interfaceData[name].txDrop.push(iface.tx_dropped_speed || 0);

            if (isLast) {
              totalRxSpeed += rxSpeed;
              totalTxSpeed += txSpeed;
            }
          });
        });
      }

      // 更新网卡图表
      Object.keys(interfaceCharts).forEach(name => {
        interfaceCharts[name].setOption({
          xAxis: {data: interfaceData[name].labels},
          series: [
            {data: interfaceData[name].rx},
            {data: interfaceData[name].tx},
            {data: interfaceData[name].rxDrop},
            {data: interfaceData[name].txDrop}
          ]
        });
      });

      // 更新统计卡片
      if (historyData.length > 0) {
        const latest = historyData[historyData.length - 1];
        const dlSpeed = formatSpeed(totalRxSpeed);
        const ulSpeed = formatSpeed(totalTxSpeed);
        const totSpeed = formatSpeed(totalRxSpeed + totalTxSpeed);

        document.getElementById('download-speed').innerHTML = statHtml(dlSpeed);
        document.getElementById('upload-speed').innerHTML = statHtml(ulSpeed);
        document.getElementById('total-speed').innerHTML = statHtml(totSpeed);
        document.getElementById('current-timezone').textContent = browserTimeZone;
        document.getElementById('last-update').textContent = new Date(latest.timestamp_ms).toLocaleString('zh-CN', {
          timeZone: browserTimeZone,
          hour12: false
        });
        $dataPoints.textContent = `${historyData.length} 个数据点`;

        // 更新丢包统计（汇总所有接口）
        if (latest.interfaces && latest.interfaces.length > 0) {
          const lastRx = latest.interfaces.reduce((sum, iface) => sum + (iface.rx_dropped_speed || 0), 0);
          const lastTx = latest.interfaces.reduce((sum, iface) => sum + (iface.tx_dropped_speed || 0), 0);
          document.getElementById('rx-loss-per-sec').innerHTML = `${lastRx}<span class="stat-unit">包/秒</span>`;
          document.getElementById('tx-loss-per-sec').innerHTML = `${lastTx}<span class="stat-unit">包/秒</span>`;
        } else {
          document.getElementById('rx-loss-per-sec').innerHTML = '0<span class="stat-unit">包/秒</span>';
          document.getElementById('tx-loss-per-sec').innerHTML = '0<span class="stat-unit">包/秒</span>';
        }
      }
    }

    /* ═══════════════════════════════════════════
       SSE
    ═══════════════════════════════════════════ */
    function disconnectSSE() {
      currentStreamToken += 1;
      if (eventSource) {
        eventSource.close();
        eventSource = null;
      }
    }

    // 加载历史数据（根据时间范围）
    async function loadHistoryData(ns, duration) {
      const url = `${baseUrl}/api/history?namespace=${encodeURIComponent(ns)}&duration=${duration}`;
      console.log('[API] 加载历史数据:', url);

      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const result = await res.json();

        console.log('[API] 收到数据:', result.count, '条, 分辨率:', result.data.length > 0 ? result.data[0].resolution : 'N/A');

        clearCharts();
        processHistoryData(result.data || [], false);
        showDataUI();

        return result;
      } catch (e) {
        console.error('[API] 加载失败:', e);
        throw e;
      }
    }

    // SSE 连接（根据时间范围推送不同粒度的数据）
    function connectSSE(ns, duration) {
      disconnectSSE();

      const streamToken = currentStreamToken;
      const url = `${baseUrl}/api/stream?namespace=${encodeURIComponent(ns)}&duration=${duration}`;
      console.log('[SSE] 连接:', url);

      try {
        eventSource = new EventSource(url);

        eventSource.onopen = () => {
          if (streamToken !== currentStreamToken) return;
          console.log('[SSE] 已连接');
          setStatus('connected', `已连接 · ${ns} · ${formatDuration(duration)}`);
        };

        eventSource.onmessage = (event) => {
          if (streamToken !== currentStreamToken || ns !== currentNs || duration !== currentDuration) {
            return;
          }

          try {
            const msg = JSON.parse(event.data);
            if (msg.type === 'incremental') {
              const newData = (msg.data || []).filter(item => item && item.namespace === currentNs);
              if (newData.length > 0) {
                const lastTimestampMs = historyData.length > 0 ? historyData[historyData.length - 1].timestamp_ms : null;

                const liveData = newData.filter(item => item.timestamp_ms !== lastTimestampMs);

                if (liveData.length > 0) {
                  historyData = historyData.concat(liveData);

                  const maxPoints = duration <= 5 ? 300 : duration <= 60 ? 360 : 180;
                  if (historyData.length > maxPoints) {
                    historyData = historyData.slice(-maxPoints);
                  }

                  processHistoryData(historyData, false);
                  showDataUI();
                }
              }
            }
          } catch (e) {
            console.error('[SSE] 消息解析失败:', e);
          }
        };

        eventSource.onerror = (err) => {
          if (streamToken !== currentStreamToken) return;
          console.warn('[SSE] 错误，等待自动重连', err);
          setStatus('error', '连接中断，正在重连…');
        };
      } catch (e) {
        console.error('[SSE] 无法创建连接:', e);
        setStatus('error', '连接失败');
      }
    }

    /* ═══════════════════════════════════════════
       命名空间/时间范围切换
    ═══════════════════════════════════════════ */
    async function switchNamespace(ns) {
      if (!ns) return;
      currentNs = ns;
      document.getElementById('current-ns-label').textContent = ns;

      // 加载历史数据
      await loadHistoryData(ns, currentDuration);

      // 建立SSE实时连接（所有时间范围都推送，按粒度推送）
      connectSSE(ns, currentDuration);
    }

    async function switchDuration(duration) {
      currentDuration = duration;
      $durationLabel.textContent = formatDuration(duration);

      if (currentNs) {
        await loadHistoryData(currentNs, duration);

        // 建立SSE实时连接（所有时间范围都推送，按粒度推送）
        connectSSE(currentNs, duration);
      }
    }

    /* ═══════════════════════════════════════════
       加载命名空间列表
    ═══════════════════════════════════════════ */
    async function loadNamespaces() {
      const res = await fetch(`${baseUrl}/api/namespaces`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const list = data.namespaces || data;
      if (!Array.isArray(list) || list.length === 0) throw new Error('命名空间列表为空');
      return list;
    }

    /* ═══════════════════════════════════════════
       连接按钮
    ═══════════════════════════════════════════ */
    async function handleConnect() {
      const url = $serverUrl.value.trim().replace(/\/$/, '');
      if (!url) {
        $connectHint.textContent = '请输入服务器地址';
        $connectHint.style.color = '#ef4444';
        return;
      }

      $btnConnect.disabled = true;
      $connectHint.style.color = '#9ca3af';
      $connectHint.textContent = '正在连接…';
      setStatus('', '连接中…');

      try {
        baseUrl = url;
        localStorage.setItem('trafficMonitorBaseUrl', url);

        const namespaces = await loadNamespaces();

        // 填充下拉框
        $nsSelect.innerHTML = '';
        namespaces.forEach(ns => {
          const opt = document.createElement('option');
          opt.value = ns;
          opt.textContent = ns;
          $nsSelect.appendChild(opt);
        });
        $nsSelect.disabled = false;
        $durationSelect.disabled = false;

        $connectHint.textContent = `✓ 获取到 ${namespaces.length} 个命名空间`;
        $connectHint.style.color = '#10b981';

        showDataUI();

        // 选第一个命名空间并建立 SSE
        const firstNs = namespaces[0];
        $nsSelect.value = firstNs;
        switchNamespace(firstNs);

      } catch (e) {
        console.error('[connect]', e);
        setStatus('error', '连接失败');
        $connectHint.textContent = `连接失败：${e.message}`;
        $connectHint.style.color = '#ef4444';
        disconnectSSE();
        hideDataUI();
      } finally {
        $btnConnect.disabled = false;
      }
    }

    /* ═══════════════════════════════════════════
       事件绑定
    ═══════════════════════════════════════════ */
    $btnConnect.addEventListener('click', handleConnect);

    $serverUrl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleConnect();
    });

    $nsSelect.addEventListener('change', () => {
      const ns = $nsSelect.value;
      if (ns) switchNamespace(ns);
    });

    $durationSelect.addEventListener('change', () => {
      const duration = parseInt($durationSelect.value, 10);
      if (duration) switchDuration(duration);
    });

    window.addEventListener('beforeunload', disconnectSSE);

    window.addEventListener('resize', () => {
      Object.values(interfaceCharts).forEach(c => c.resize());
      if (lossChart) lossChart.resize();
    });

    /* ═══════════════════════════════════════════
       初始化 — 从 localStorage 恢复地址
    ═══════════════════════════════════════════ */
    (function init() {
      const saved = localStorage.getItem('trafficMonitorBaseUrl');
      if (saved) {
        $serverUrl.value = saved;
        $connectHint.textContent = `上次连接的地址已填入，点击「连接」开始监控`;
      }
    })();
  </script>
</body>
